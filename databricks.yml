bundle:
  name: appkit-all-in-one

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID
  files_path:
    description: Volume path for file storage (e.g. /Volumes/catalog/schema/volume_name)
  files_id:
    description: Permission to write to volumes
  genie_space_id:
    description: Default Genie Space ID
  genie_space_name:
    description: Genie Space display name
  referral_llm_endpoint:
    description: Databricks Model Serving endpoint used to expand care and location search terms for Referral Copilot
  postgres_branch:
    description: Full Lakebase Postgres branch resource name. Obtain by running `databricks postgres list-branches {project-name}`, select the desired item from the output array and use its .name value. Requires the project resource name.
  postgres_database:
    description: Full Lakebase Postgres database resource name. Obtain by running `databricks postgres list-databases {branch-name}`, select the desired item from the output array and use its .name value. Requires the branch resource name.
  postgres_project:
    description: Full Lakebase Postgres project resource name. Obtain by running `databricks postgres list-projects`, select the desired item from the output array and use its .name value.

resources:
  apps:
    app:
      name: "appkit-all-in-one"
      description: "Data readiness and review desk for healthcare facility planning, powered by Databricks AppKit and Lakebase"
      source_code_path: ./
      user_api_scopes:
        - dashboards.genie
        - serving.serving-endpoints
        - files.files

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: files
          uc_securable:
            securable_full_name: ${var.files_id}
            securable_type: VOLUME
            permission: WRITE_VOLUME
        - name: genie-space
          genie_space:
            name: ${var.genie_space_name}
            space_id: ${var.genie_space_id}
            permission: CAN_RUN
        - name: referral-llm
          serving_endpoint:
            name: ${var.referral_llm_endpoint}
            permission: CAN_QUERY
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-d1e1d905-9771.cloud.databricks.com

    variables:
      sql_warehouse_id: e2fdb7a639b26e09
      files_path: /Volumes/workspace/default/myvol
      files_id: workspace.default.myvol
      genie_space_id: 01f16933c2201d569fdc4cd530503b30
      genie_space_name: India Health and Facility Insights
      referral_llm_endpoint: databricks-meta-llama-3-3-70b-instruct
      postgres_branch: projects/mylakebase/branches/production
      postgres_database: projects/mylakebase/branches/production/databases/databricks-postgres
      postgres_project: projects/mylakebase
